<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>
 
    .container{
        width: 700px;
        margin: 30px auto;
    }
    
    table{
        width: 100%;
    }

    tr{
        height: 50px;
    }

    .tag{
        text-align: center;
        font-weight: bold;
    }

    .apply{
        text-align: center;
    }
    
    #width,#height,#fontSize{
        width: 60px;
    }

    #boximg{
        margin: auto;
        display: none;
    }

</style>

</head>
<body>

<div class="container">

<table>
    <tr>
        <td class="tag">너비 :</td>
        <td><input type="number" min="0" id="width"> px</td>

        <td class="tag">높이 :</td>
        <td><input type="number" min="0" id="height"> px</td>
    </tr>

    <tr>
        <td class="tag">글자크기 :</td>
        <td><input type="number" min="0" id="fontSize"> px</td>

        <td class="tag">굵기 :</td>
        <td>
            <label>보통 <input type="radio" name="bold" value="normal"></label>
            <label>굵게 <input type="radio" name="bold" value="bold"></label>
        </td>
    </tr>

    <tr>
        <td class="tag">글자색 :</td>
        <td><input type="text" id="textColor"></td>

        <td class="tag">배경색 :</td>
        <td><input type="text" id="bgColor"></td>
    </tr>

    <tr>
    <td class="tag">가로정렬 :</td>
        <td colspan="3">
            <label>왼쪽 <input type="radio" name="gaAlign" value="flex-start"></label>
            <label>가운데 <input type="radio" name="gaAlign" value="center"></label>
            <label>오른쪽 <input type="radio" name="gaAlign" value="flex-end"></label>
        </td>
    </tr>

    <tr>
    <td class="tag">세로정렬 :</td>
        <td colspan="3">
            <label>위 <input type="radio" name="seAlign" value="flex-start"></label>
            <label>가운데 <input type="radio" name="seAlign" value="center"></label>
            <label>아래 <input type="radio" name="seAlign" value="flex-end"></label>
        </td>
    </tr>

    <tr>
        <td class="tag">출력 문자열 :</td>
        <td colspan="3">
            <input type="text" id="text" style="width:100%;">
        </td>
    </tr>

    <tr>
        <td colspan="4" class="apply">
            <button onclick="applyStyle()">적용하기</button>
        </td>
    </tr>

</table>

<div id="boximg">
    <span id="boximgText"></span>
</div>

</div>

<script>
function applyStyle(){
    
    const boximg = document.getElementById("boximg");
    const boximgText = document.getElementById("boximgText");
    const width = document.getElementById("width").value;
    const height = document.getElementById("height").value;
    const fontSize = document.getElementById("fontSize").value;
    const textColor = document.getElementById("textColor").value;
    const bgColor = document.getElementById("bgColor").value;
    const text = document.getElementById("text").value;

    const bolds = document.querySelector('input[name="bold"]:checked');
    const gaAligns = document.querySelector('input[name="gaAlign"]:checked');
    const seAligns = document.querySelector('input[name="seAlign"]:checked');


    boximg.style.display = "flex";
    boximg.style.width = width + "px";
    boximg.style.height = height + "px";
    boximg.style.border = "3px solid black";
    boximg.style.backgroundColor = bgColor;

    boximgText.style.fontSize = fontSize + "px";
    boximgText.style.color = textColor;

    if(gaAligns) 
    boximg.style.justifyContent = gaAligns.value;

    if(seAligns) 
    boximg.style.alignItems = seAligns.value;

    if(bolds) 
    boximgText.style.fontWeight = bolds.value;

    boximgText.innerText = text;
 
}
</script>

</body>
</html>
